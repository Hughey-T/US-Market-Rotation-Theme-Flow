name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  schema-and-canonical-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python scripts/validate_repository.py
      - name: Validate immutable judgments against PR base
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python scripts/validate_immutable_judgments.py --base "$BASE_SHA"
      - run: python scripts/generate_weekly.py --fixture tests/fixtures/latest_normal.json --dry-run
      - run: python -m unittest tests.test_condition_audit tests.test_immutable_judgments -v

  unit-and-rule-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall -q rotation scripts tests
      - run: python -m unittest tests.test_spec_cases tests.test_rule_reachability tests.test_semantic_validation -v

  pipeline-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_pipeline_contract tests.test_generation_e2e -v

  production-orchestration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_production_orchestration_e2e -v

  repository-operations-and-transactional-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_publication_contract tests.test_membership_contract -v

  judgment-projection-semantics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_judgment_projection -v

  publication-recovery-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_publication_hardening -v

  workflow-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_lock_and_workflow_contract -v
