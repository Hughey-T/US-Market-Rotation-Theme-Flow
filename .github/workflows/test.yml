name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q rotation scripts tests
      - name: Unit, T01-T49, and rule reachability
        run: python -m unittest discover -s tests -v
      - name: Strict schema and semantic repository validation
        run: python scripts/validate_repository.py
      - name: Offline fixture end-to-end
        run: python scripts/generate_weekly.py --fixture tests/fixtures/latest_normal.json --dry-run
