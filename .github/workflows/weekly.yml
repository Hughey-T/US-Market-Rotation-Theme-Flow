# 週次データ生成（毎週土曜 08:00 日本時間 = 金曜 23:00 UTC、NY市場の金曜引け後）
# 手動実行も可能（Actionsタブ → weekly-data → Run workflow）
name: weekly-data

on:
  schedule:
    - cron: "0 23 * * FRI"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-market-rotation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit tests and preflight validation
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_repository.py

      - name: Generate weekly data
        run: python scripts/generate_weekly.py

      - name: Validate generated outputs
        run: python scripts/validate_repository.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/latest.json output/archive/ output/history/
          git commit -m "weekly data $(date -u +%F)" || echo "no changes to commit"
          git push
