# Scheduled live acquisition is intentionally separate from the PR merge gate.
name: weekly-data

on:
  schedule:
    - cron: "0 23 * * FRI"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-market-rotation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Offline preflight
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_repository.py
      - name: Generate, validate, and atomically publish
        id: generate
        run: python scripts/generate_weekly.py
      - name: Validate published repository
        run: python scripts/validate_repository.py
      - name: Commit validated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --check
          git add output/latest.json output/archive/ output/history/ output/judgments/index.json
          git commit -m "weekly data $(date -u +%F)" || echo "no changes to commit"
          git push
      - name: Failure summary
        if: failure()
        run: |
          echo "Generation or validation failed. The generator publishes latest.json last, so the previous successful artifact was not replaced." >> "$GITHUB_STEP_SUMMARY"
